<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Parking Helper</title>
<style>
  body{font-family:Inter,system-ui; margin:0; background:#f7f9fc; color:#111}
  .app{max-width:640px;margin:0 auto;padding:0}
  header{background:#0b74de;color:#fff;padding:12px;text-align:center;font-weight:600}
  nav{display:flex;justify-content:space-around;background:#eaf2fb}
  nav button{flex:1;padding:12px;border:none;background:none;font-size:14px;cursor:pointer}
  nav button.active{background:#fff;border-bottom:3px solid #0b74de;font-weight:600}
  section{padding:16px;display:none}
  section.active{display:block}
  .card{background:#fff;padding:14px;border-radius:10px;margin-bottom:12px;box-shadow:0 2px 6px rgba(0,0,0,.05)}
  label{font-size:13px;color:#666;margin-bottom:4px;display:block}
  input,select,button{width:100%;padding:10px;border-radius:8px;border:1px solid #dbe6f2;font-size:14px}
  button{background:#0b74de;color:#fff;border:none;cursor:pointer;margin-top:8px}
  .small-btn{background:#f3f7fb;color:#0b74de;border:1px solid #dbe6f2}
  .muted{color:#666;font-size:13px}
  @media(max-width:480px){
    nav button{font-size:12px;padding:10px}
    .card{padding:10px}
  }
</style>
</head>
<body>
<div class="app">
  <header>Parking Helper</header>
  <nav>
    <button data-tab="fee" class="active">Fee Calculator</button>
    <button data-tab="location">Location</button>
    <button data-tab="saved">Saved Spots</button>
    <button data-tab="settings">Settings</button>
  </nav>

  <!-- Fee Calculator -->
  <section id="fee" class="active">
    <div class="card">
      <div><span class="muted">Check‑in:</span> <span id="checkinTime">—</span></div>
      <div><span class="muted">Elapsed:</span> <span id="elapsed">00:00</span></div>
      <div><span class="muted">Current fee:</span> <span id="currentFee">$0.00</span></div>
      <button id="btnCheckin">Check in</button>
      <button id="btnCheckout" class="small-btn">Check out</button>
      <label>Target leave time</label>
      <input id="targetLeave" type="datetime-local" />
      <div id="estimateBreakdown" class="muted"></div>
    </div>
    <div class="card">
      <label>Charging scheme</label>
      <select id="schemeType">
        <option value="hourly">Hourly</option>
        <option value="flat">Flat</option>
      </select>
      <label>Rate</label>
      <input id="rateInput" type="number" value="10" />
    </div>
  </section>

  <!-- Location -->
  <section id="location">
    <div class="card">
      <label>Address / Notes</label>
      <input id="address" placeholder="Level B2, near elevator" />
      <label>Keywords</label>
      <input id="keywords" placeholder="e.g., EV charger" />
      <label>Photo</label>
      <input id="photoInput" type="file" accept="image/*" capture="environment" />
      <button id="btnSave">Save Spot</button>
    </div>
  </section>

  <!-- Saved Spots -->
  <section id="saved">
    <div class="card">
      <label>Saved spots</label>
      <div id="savedList" class="muted">No saved spots yet</div>
    </div>
  </section>

  <!-- Settings -->
  <section id="settings">
    <div class="card">
      <p class="muted">Settings placeholder (extend later)</p>
    </div>
  </section>
</div>

<script>
const state = JSON.parse(localStorage.getItem("parkingState")) || {
  checkin:null, targetLeave:null, scheme:{type:"hourly", rate:10}, savedSpots:[]
};
const el=id=>document.getElementById(id);

function saveState(){ localStorage.setItem("parkingState", JSON.stringify(state)); }

function formatElapsed(ms){
  if(!ms) return "00:00";
  const m=Math.floor(ms/60000), h=Math.floor(m/60);
  return String(h).padStart(2,"0")+":"+String(m%60).padStart(2,"0");
}
function computeFee(start,end,scheme){
  const minutes=Math.ceil((end-start)/60000);
  if(scheme.type==="flat") return scheme.rate;
  return (scheme.rate/60)*minutes;
}

function updateUI(){
  if(state.checkin){
    el("checkinTime").textContent=new Date(state.checkin).toLocaleString();
    const now=new Date();
    el("elapsed").textContent=formatElapsed(now-new Date(state.checkin));
    const fee=computeFee(new Date(state.checkin), now, state.scheme);
    el("currentFee").textContent="$"+fee.toFixed(2);
  }
  el("savedList").innerHTML=state.savedSpots.map(s=>`<div>${s.address} (${s.keywords})</div>`).join("")||"No saved spots yet";
}
updateUI();

el("btnCheckin").onclick=()=>{
  state.checkin=new Date().toISOString(); saveState(); updateUI();
};
el("btnCheckout").onclick=()=>{
  state.checkin=null; saveState(); updateUI();
};
el("targetLeave").onchange=e=>{
  state.targetLeave=e.target.value; saveState();
};
el("schemeType").onchange=e=>{
  state.scheme.type=e.target.value; saveState();
};
el("rateInput").onchange=e=>{
  state.scheme.rate=parseFloat(e.target.value); saveState();
};
el("btnSave").onclick=()=>{
  state.savedSpots.push({address:el("address").value,keywords:el("keywords").value});
  saveState(); updateUI();
};

/* Tab navigation */
document.querySelectorAll("nav button").forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    document.querySelectorAll("section").forEach(sec=>sec.classList.remove("active"));
    document.getElementById(btn.dataset.tab).classList.add("active");
  };
});
</script>
</body>
</html>
