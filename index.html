<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- 行動裝置 App 化標籤 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="咕嚕咕嚕">
    <meta name="mobile-web-app-capable" content="yes">
    
    <!-- 圖示設定：縮小置中優化版 -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22%23FF8400%22/><text y=%2250%%22 x=%2250%%22 dominant-baseline=%22central%22 text-anchor=%22middle%22 font-size=%2265%22>🥘</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22%23FF8400%22/><text y=%2250%%22 x=%2250%%22 dominant-baseline=%22central%22 text-anchor=%22middle%22 font-size=%2265%22>🥘</text></svg>">

    <title>咕嚕咕嚕 - 火鍋計時大師</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap');

        :root {
            --bg-color: #FFFAEC;
            --main-yellow: #FFD93D;
            --main-orange: #FF8400;
            --main-red: #FF4B2B;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'ZCOOL KuaiLe', 'Microsoft JhengHei', cursive, sans-serif;
        }

        /* 卡通厚重陰影風格 */
        .cartoon-card {
            border: 3px solid #333;
            box-shadow: 4px 4px 0px #333;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .cartoon-card:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px #333;
        }

        .cartoon-btn {
            border: 2px solid #333;
            box-shadow: 3px 3px 0px #333;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .cartoon-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px #333;
        }

        /* 呼吸效果 */
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .timer-active {
            animation: bounce 0.8s infinite;
            background-color: var(--main-yellow) !important;
            border-color: var(--main-orange) !important;
        }

        @keyframes crazy-flash {
            0% { background-color: var(--main-red); transform: rotate(-2deg); }
            50% { background-color: #fff; transform: rotate(2deg); }
            100% { background-color: var(--main-red); transform: rotate(-2deg); }
        }
        .timer-finished {
            animation: crazy-flash 0.2s infinite;
            border-color: #333 !important;
        }

        * { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
        input { -webkit-user-select: text; user-select: text; }
    </style>
</head>
<body class="text-slate-800 min-h-screen p-3 pb-48">

    <header class="text-center mb-6 pt-4">
        <div class="inline-block relative">
            <span class="text-4xl block mb-1">🥘</span>
            <h1 class="text-3xl font-black text-orange-600 tracking-wider italic">咕嚕咕嚕！</h1>
            <p class="text-orange-400 text-[10px] font-bold bg-white px-3 py-0.5 rounded-full cartoon-btn mt-1 inline-block">1排3個熱鬧滾滾！</p>
        </div>
    </header>

    <!-- 食材計時網格 -->
    <div id="timerGrid" class="grid grid-cols-3 gap-3 mb-8"></div>

    <!-- 新增食材區域 -->
    <section class="bg-white p-5 rounded-[2rem] cartoon-card">
        <h2 class="text-lg font-black mb-3 flex items-center gap-2 text-red-500">
            <span>🍳</span> 我要加料！
        </h2>
        <div class="space-y-3">
            <input id="customName" type="text" placeholder="食材叫什麼？" class="w-full bg-orange-50 rounded-xl p-3 border-2 border-slate-800 outline-none focus:bg-white transition-all text-md font-bold">
            <input id="customTime" type="number" placeholder="要煮幾秒？" class="w-full bg-orange-50 rounded-xl p-3 border-2 border-slate-800 outline-none focus:bg-white transition-all text-md font-bold">
            <button onclick="addFood()" class="w-full bg-yellow-400 hover:bg-yellow-300 text-slate-800 font-black py-3 rounded-xl active:scale-95 transition-all cartoon-btn text-lg tracking-widest">
                <span>🔥</span> 丟進鍋裡！
            </button>
        </div>
    </section>

    <!-- 編輯模態視窗 -->
    <div id="editModal" class="fixed inset-0 bg-orange-500/80 backdrop-blur-sm z-[1000] hidden items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] cartoon-card p-6">
            <h3 class="text-xl font-black mb-4 text-slate-800 text-center">修改食譜 ✨</h3>
            <input id="editName" type="text" class="w-full bg-slate-100 rounded-xl p-3 mb-3 border-2 border-slate-800 font-bold outline-none">
            <input id="editSec" type="number" class="w-full bg-slate-100 rounded-xl p-3 mb-5 border-2 border-slate-800 font-bold outline-none">
            <div class="flex gap-3">
                <button onclick="closeEdit()" class="flex-1 bg-slate-200 text-slate-500 font-black py-3 rounded-xl cartoon-btn">
                    <span>❌</span> 算了
                </button>
                <button onclick="confirmEdit()" class="flex-1 bg-green-400 text-white font-black py-3 rounded-xl cartoon-btn">
                    <span>✅</span> 改好了！
                </button>
            </div>
        </div>
    </div>

    <!-- 底部控制欄 -->
    <div class="fixed bottom-4 left-4 right-4 flex gap-3 z-[500]">
        <button onclick="resetAll()" class="flex-[2] bg-red-500 text-white font-black py-4 rounded-[1.5rem] cartoon-btn text-lg uppercase tracking-widest">
            <span>🛑</span> 全部停下！
        </button>
        <button onclick="restoreDefaults()" class="flex-1 bg-white text-slate-400 font-bold py-4 rounded-[1.5rem] cartoon-btn text-[10px] uppercase">
            <span>♻️</span> 重來啦
        </button>
    </div>

    <script>
        const KEY = 'HOTPOT_CARTOON_V4_FINAL';
        const initialDefaults = [
            { id: '1', name: '牛柏葉', seconds: 420 },
            { id: '2', name: '鮮沙白', seconds: 180 },
            { id: '3', name: 'Q鮑魚', seconds: 300 },
            { id: '4', name: '滑烏冬', seconds: 300 }
        ];

        let foods = JSON.parse(localStorage.getItem(KEY));
        if (!foods) {
            foods = [...initialDefaults];
            localStorage.setItem(KEY, JSON.stringify(foods));
        }

        let activeTimers = {};
        let currentEditId = null;
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function save() { 
            localStorage.setItem(KEY, JSON.stringify(foods)); 
        }

        function formatTime(s) { 
            if (s <= 0) return "OK!";
            return s >= 60 ? `${Math.floor(s/60)}m${s%60}s` : `${s}s`; 
        }

        function render() {
            const grid = document.getElementById('timerGrid');
            if (!grid) return;
            grid.innerHTML = '';
            
            foods.forEach(f => {
                const col = document.createElement('div');
                col.className = "flex flex-col gap-2";
                col.innerHTML = `
                    <div id="card-${f.id}" onclick="toggleTimer('${f.id}')" class="cartoon-card relative flex flex-col items-center justify-center p-2 bg-white rounded-[1.5rem] min-h-[90px] overflow-hidden cursor-pointer text-center">
                        <span class="text-sm font-black text-slate-800 mb-0.5 break-all line-clamp-1">${f.name}</span>
                        <span id="time-${f.id}" class="text-[10px] font-bold text-orange-500">${formatTime(f.seconds)}</span>
                        <div id="prog-${f.id}" class="absolute bottom-0 left-0 h-1.5 bg-orange-400 w-0 transition-all duration-1000"></div>
                    </div>
                    <div class="flex gap-1">
                        <button onclick="event.stopPropagation(); openEdit('${f.id}')" class="flex-1 py-1.5 bg-blue-50 rounded-lg text-[10px] font-black text-blue-600 cartoon-btn uppercase"><span>✏️</span> 改</button>
                        <button onclick="event.stopPropagation(); removeFood('${f.id}')" class="flex-1 py-1.5 bg-red-50 rounded-lg text-[10px] font-black text-red-500 cartoon-btn uppercase"><span>🗑️</span> 刪</button>
                    </div>
                `;
                grid.appendChild(col);
            });
        }

        function removeFood(id) {
            setTimeout(() => {
                if(confirm("真的不吃這個了嗎？")) {
                    if (activeTimers[id]) {
                        clearInterval(activeTimers[id]);
                        delete activeTimers[id];
                    }
                    foods = foods.filter(f => f.id !== id);
                    save();
                    render();
                }
            }, 10);
        }

        function openEdit(id) {
            currentEditId = id;
            const food = foods.find(f => f.id === id);
            if (!food) return;
            document.getElementById('editName').value = food.name;
            document.getElementById('editSec').value = food.seconds;
            document.getElementById('editModal').classList.replace('hidden', 'flex');
        }

        function closeEdit() {
            document.getElementById('editModal').classList.replace('flex', 'hidden');
        }

        function confirmEdit() {
            const idx = foods.findIndex(f => f.id === currentEditId);
            if (idx === -1) return;
            
            const n = document.getElementById('editName').value.trim();
            const s = parseInt(document.getElementById('editSec').value);
            
            if (n && !isNaN(s)) {
                foods[idx].name = n;
                foods[idx].seconds = s;
                save(); 
                render();
                if(activeTimers[currentEditId]) stopTimer(currentEditId);
                closeEdit();
            }
        }

        function toggleTimer(id) {
            const el = document.getElementById(`card-${id}`);
            if (!el) return;
            if (el.classList.contains('timer-finished')) { resetTimerUI(id); return; }
            activeTimers[id] ? stopTimer(id) : startTimer(id);
        }

        function startTimer(id) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const food = foods.find(f => f.id === id);
            if (!food) return;
            
            let left = food.seconds;
            const el = document.getElementById(`card-${id}`), txt = document.getElementById('time-'+id), bar = document.getElementById('prog-'+id);
            
            if (!el) return;
            el.classList.add('timer-active');
            
            activeTimers[id] = setInterval(() => {
                left--;
                if(left >= 0) {
                    if (txt) txt.innerText = formatTime(left);
                    if (bar) bar.style.width = `${((food.seconds - left) / food.seconds) * 100}%`;
                }
                if (left <= 0) {
                    clearInterval(activeTimers[id]); delete activeTimers[id];
                    el.classList.remove('timer-active'); el.classList.add('timer-finished');
                    if (txt) txt.innerText = "開動！🥢";
                    if (navigator.vibrate) navigator.vibrate([300, 100, 300]);
                    playSuccessSound();
                }
            }, 1000);
        }

        function playSuccessSound() {
            try {
                const o = audioCtx.createOscillator(), g = audioCtx.createGain();
                o.type = 'triangle'; o.frequency.setValueAtTime(523.25, audioCtx.currentTime);
                o.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.3);
                g.gain.setValueAtTime(0.2, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                o.connect(g); g.connect(audioCtx.destination);
                o.start(); o.stop(audioCtx.currentTime + 0.4);
            } catch(e) {}
        }

        function stopTimer(id) {
            if (activeTimers[id]) {
                clearInterval(activeTimers[id]); 
                delete activeTimers[id];
            }
            resetTimerUI(id);
        }

        function resetTimerUI(id) {
            const f = foods.find(f => f.id === id);
            if(!f) return;
            const el = document.getElementById(`card-${id}`), txt = document.getElementById('time-'+id), bar = document.getElementById('prog-'+id);
            if (el) el.classList.remove('timer-active', 'timer-finished');
            if (txt) txt.innerText = formatTime(f.seconds);
            if (bar) bar.style.width = '0%';
        }

        function addFood() {
            const n = document.getElementById('customName'), t = document.getElementById('customTime');
            if (!n || !t || !n.value || !t.value) return;
            foods.push({ id: Date.now().toString(), name: n.value, seconds: parseInt(t.value) });
            save(); render();
            n.value = ''; t.value = '';
        }

        function resetAll() { Object.keys(activeTimers).forEach(id => stopTimer(id)); render(); }
        function restoreDefaults() { if(confirm("恢復原始設定？")){ localStorage.removeItem(KEY); location.reload(); } }

        window.onload = render;
    </script>
</body>
</html>
