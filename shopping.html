<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>超市優惠計算器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body {
            font-family: 'Inter', 'Noto+Sans+TC', sans-serif;
            background-color: #f1f5f9;
            touch-action: manipulation;
        }
        .item-row { animation: slideIn 0.2s ease-out; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .pulse-mic { animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .tab-transition { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .winner-card { border: 2px solid #22c55e !important; background-color: #f0fdf4 !important; }
        
        /* Ensure SVGs are visible */
        svg { display: block; shape-rendering: auto; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-md mx-auto bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-200 flex flex-col min-h-[650px]">
        <!-- Header -->
        <div class="bg-blue-600 p-6 text-white shrink-0">
            <div class="flex justify-between items-center mb-4">
                <h1 class="text-2xl font-bold">購物助手</h1>
                <div class="flex gap-2">
                    <button onclick="toggleSettings()" class="p-2 hover:bg-blue-500 rounded-full transition-colors">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                    </button>
                </div>
            </div>
            
            <div id="settings-panel" class="hidden mb-4 bg-blue-700/50 p-4 rounded-2xl">
                <label class="block text-xs font-semibold uppercase tracking-wider mb-2 opacity-80">更改優惠券門檻 (HK$)</label>
                <div class="flex gap-2">
                    <input type="number" id="target-input" value="100" class="flex-1 bg-white/20 border-none rounded-xl p-2 text-white placeholder-white/50 focus:ring-2 focus:ring-white">
                    <button onclick="saveTarget()" class="bg-white text-blue-700 px-4 py-2 rounded-xl font-bold text-sm">更新</button>
                </div>
            </div>

            <p class="text-blue-100 text-sm opacity-90" id="goal-text">目標金額: $100.00</p>
        </div>

        <!-- Main Tabs -->
        <div class="flex border-b border-slate-100 shrink-0">
            <button onclick="switchTab('current')" id="tab-current" class="flex-1 py-4 text-sm font-bold text-blue-600 border-b-2 border-blue-600 tab-transition">當前清單</button>
            <button onclick="switchTab('compare')" id="tab-compare" class="flex-1 py-4 text-sm font-bold text-slate-400 hover:text-slate-600 tab-transition">比價工具</button>
            <button onclick="switchTab('history')" id="tab-history" class="flex-1 py-4 text-sm font-bold text-slate-400 hover:text-slate-600 tab-transition">歷史記錄</button>
        </div>

        <!-- View: Current List -->
        <div id="view-current" class="flex flex-col flex-1 overflow-hidden">
            <!-- Progress -->
            <div class="p-6 border-b border-slate-100 shrink-0">
                <div class="flex justify-between items-end mb-3">
                    <div>
                        <span class="text-slate-500 text-[10px] font-bold uppercase tracking-widest block">目前總計</span>
                        <span class="text-4xl font-black text-slate-800" id="display-total">$0.00</span>
                    </div>
                    <span id="status-badge" class="px-3 py-1 rounded-full text-[10px] font-bold bg-slate-100 text-slate-500">未達標</span>
                </div>
                <div class="w-full bg-slate-100 h-3 rounded-full overflow-hidden shadow-inner">
                    <div id="progress-bar" class="bg-blue-500 h-full transition-all duration-500 ease-out" style="width: 0%"></div>
                </div>
                <p id="remaining-text" class="mt-4 text-xs text-slate-500 font-medium italic text-center">清單為空</p>
            </div>

            <!-- Input Section -->
            <div class="p-6 space-y-3 bg-slate-50/50 shrink-0">
                <div class="grid grid-cols-12 gap-2">
                    <div class="relative col-span-12">
                        <input type="text" id="item-name" placeholder="商品名稱..." class="w-full p-4 pr-12 rounded-2xl border border-slate-200 text-base focus:border-blue-500 shadow-sm appearance-none">
                        <button id="mic-btn" onclick="toggleVoice()" class="absolute right-2 top-1/2 -translate-y-1/2 p-3 text-slate-400 hover:text-blue-600">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
                        </button>
                    </div>
                    <input type="number" id="item-price" placeholder="$ 價錢" step="0.1" class="col-span-7 p-4 rounded-2xl border border-slate-200 text-base focus:border-blue-500 shadow-sm appearance-none">
                    <input type="number" id="item-qty" value="1" min="1" class="col-span-5 p-4 rounded-2xl border border-slate-200 text-base focus:border-blue-500 text-center shadow-sm appearance-none">
                </div>
                
                <!-- FIXED ADD BUTTON WITH ROBUST PLUS ICON -->
                <button onclick="addItem()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl transition-all shadow-lg active:scale-95 flex items-center justify-center gap-3">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    <span class="text-lg">加入清單</span>
                </button>
            </div>

            <!-- List Area -->
            <div class="p-6 flex-1 overflow-y-auto">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="font-bold text-slate-700 text-sm">已加入項目 (<span id="item-count">0</span>)</h2>
                    <button onclick="clearAll()" class="text-xs font-bold text-red-500 px-2 py-1">清空</button>
                </div>
                <div id="items-container" class="space-y-3"></div>
            </div>

            <!-- Footer Action -->
            <div id="footer-action" class="p-4 border-t border-slate-100 bg-white hidden">
                <button onclick="saveCurrentToHistory()" class="w-full bg-slate-800 hover:bg-black text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-3 shadow-xl transition-all">
                    儲存並完成購物
                </button>
            </div>
        </div>

        <!-- View: Compare Tool -->
        <div id="view-compare" class="hidden flex-1 flex flex-col p-6 space-y-6 overflow-y-auto bg-slate-50">
            <div class="flex justify-between items-center">
                <h2 class="font-bold text-slate-700">單位價格比價</h2>
                <button onclick="resetComparison()" class="text-xs font-bold text-slate-400 hover:text-blue-600 flex items-center gap-1">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"></path><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
                    重置
                </button>
            </div>

            <div id="card-a" class="bg-white p-5 rounded-3xl shadow-sm border border-slate-200 space-y-4">
                <div class="flex justify-between items-center">
                    <h3 class="text-sm font-bold text-slate-800 flex items-center gap-2">
                        <span class="w-6 h-6 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center text-[10px]">A</span> 商品 A
                    </h3>
                    <span id="badge-a" class="hidden bg-green-500 text-white text-[10px] font-bold px-2 py-0.5 rounded-full">最划算</span>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <input type="number" id="comp-a-price" placeholder="價格 ($)" class="p-3 rounded-xl border border-slate-200 text-sm appearance-none">
                    <input type="number" id="comp-a-unit" placeholder="量 (g/ml)" class="p-3 rounded-xl border border-slate-200 text-sm appearance-none">
                </div>
            </div>

            <div id="card-b" class="bg-white p-5 rounded-3xl shadow-sm border border-slate-200 space-y-4">
                <div class="flex justify-between items-center">
                    <h3 class="text-sm font-bold text-slate-800 flex items-center gap-2">
                        <span class="w-6 h-6 bg-orange-100 text-orange-600 rounded-full flex items-center justify-center text-[10px]">B</span> 商品 B
                    </h3>
                    <span id="badge-b" class="hidden bg-green-500 text-white text-[10px] font-bold px-2 py-0.5 rounded-full">最划算</span>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <input type="number" id="comp-b-price" placeholder="價格 ($)" class="p-3 rounded-xl border border-slate-200 text-sm appearance-none">
                    <input type="number" id="comp-b-unit" placeholder="量 (g/ml)" class="p-3 rounded-xl border border-slate-200 text-sm appearance-none">
                </div>
            </div>

            <div id="compare-result" class="hidden p-5 rounded-3xl bg-blue-600 text-white shadow-lg text-center">
                <p id="winner-text" class="text-lg font-black"></p>
                <p id="winner-diff" class="text-[10px] mt-1 opacity-90"></p>
            </div>

            <button onclick="calculateComparison()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-all">
                立即計算比價
            </button>
        </div>

        <!-- View: History -->
        <div id="view-history" class="hidden flex-1 flex flex-col overflow-hidden">
            <div class="p-6 flex-1 overflow-y-auto">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="font-bold text-slate-700">歷史記錄</h2>
                    <button onclick="clearHistory()" class="text-xs font-bold text-slate-400 hover:text-red-500">清空歷史</button>
                </div>
                <div id="history-container" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 text-white px-6 py-3 rounded-2xl shadow-2xl opacity-0 transition-all duration-500 z-50 font-bold flex items-center gap-2 pointer-events-none">
        <span id="toast-icon"></span> <span id="toast-msg"></span>
    </div>

    <script>
        let items = [];
        let history = JSON.parse(localStorage.getItem('shop_history') || '[]');
        let THRESHOLD = 100.00;
        let recognition;

        window.onload = () => { updateUI(); updateHistoryUI(); };

        function switchTab(view) {
            const tabs = ['current', 'compare', 'history'];
            tabs.forEach(t => {
                const btn = document.getElementById(`tab-${t}`);
                const v = document.getElementById(`view-${t}`);
                if (t === view) {
                    btn.className = "flex-1 py-4 text-sm font-bold text-blue-600 border-b-2 border-blue-600 tab-transition";
                    v.classList.remove('hidden');
                } else {
                    btn.className = "flex-1 py-4 text-sm font-bold text-slate-400 hover:text-slate-600 tab-transition";
                    v.classList.add('hidden');
                }
            });
            if(view === 'history') updateHistoryUI();
        }

        function addItem() {
            const nameEl = document.getElementById('item-name');
            const priceEl = document.getElementById('item-price');
            const qtyEl = document.getElementById('item-qty');
            
            const price = parseFloat(priceEl.value);
            const qty = parseInt(qtyEl.value) || 1;

            if (isNaN(price) || price <= 0) {
                showToast('請輸入價格', '⚠️', 'bg-red-500');
                return;
            }

            const currentTotal = items.reduce((s, i) => s + (i.price * i.qty), 0);
            items.push({ 
                name: nameEl.value.trim() || `項目 ${items.length + 1}`, 
                price: price, 
                qty: qty 
            });

            if (currentTotal < THRESHOLD && (currentTotal + (price * qty)) >= THRESHOLD) {
                showToast('恭喜！已達到優惠門檻', '🎉', 'bg-green-600');
            }

            nameEl.value = ''; priceEl.value = ''; qtyEl.value = '1'; nameEl.focus();
            updateUI();
        }

        function updateQty(index, delta) {
            const prevTotal = items.reduce((s, i) => s + (i.price * i.qty), 0);
            if (items[index].qty + delta > 0) items[index].qty += delta;
            const newTotal = items.reduce((s, i) => s + (i.price * i.qty), 0);
            if (prevTotal < THRESHOLD && newTotal >= THRESHOLD) showToast('已達標！', '🎉', 'bg-green-600');
            updateUI();
        }

        function updateUI() {
            const container = document.getElementById('items-container');
            const total = items.reduce((s, i) => s + (i.price * i.qty), 0);
            document.getElementById('item-count').innerText = items.length;
            document.getElementById('display-total').innerText = `$${total.toFixed(2)}`;
            document.getElementById('footer-action').classList.toggle('hidden', items.length === 0);

            if (items.length === 0) {
                container.innerHTML = `<div class="text-center text-slate-300 py-12 text-sm italic">購物清單為空</div>`;
            } else {
                container.innerHTML = items.map((item, i) => `
                    <div class="item-row flex justify-between items-center bg-white p-4 rounded-2xl border border-slate-100 shadow-sm gap-3">
                        <div class="flex-1 min-w-0">
                            <p class="font-bold text-slate-800 text-base truncate">${item.name}</p>
                            <p class="text-xs text-slate-400 font-medium">$${item.price.toFixed(1)} / 件</p>
                        </div>
                        <div class="flex items-center bg-slate-100 rounded-xl p-1 shrink-0">
                            <button onclick="updateQty(${i}, -1)" class="p-2 text-slate-500 active:bg-slate-200 rounded-lg">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                            </button>
                            <span class="w-8 text-center text-sm font-black text-slate-700">${item.qty}</span>
                            <button onclick="updateQty(${i}, 1)" class="p-2 text-slate-500 active:bg-slate-200 rounded-lg">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                            </button>
                        </div>
                        <div class="min-w-[60px] text-right">
                            <span class="font-black text-base text-slate-800">$${(item.price * item.qty).toFixed(1)}</span>
                        </div>
                        <button onclick="removeItem(${i})" class="p-2 text-slate-300 hover:text-red-500 shrink-0">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                        </button>
                    </div>
                `).join('');
            }

            const p = Math.min((total / THRESHOLD) * 100, 100);
            const bar = document.getElementById('progress-bar');
            const remText = document.getElementById('remaining-text');
            const badge = document.getElementById('status-badge');
            bar.style.width = `${p}%`;
            
            if (total >= THRESHOLD) {
                bar.className = "bg-green-500 h-full transition-all duration-500 ease-out";
                badge.className = 'px-3 py-1 rounded-full text-[10px] font-bold bg-green-100 text-green-600';
                badge.innerText = '已達標';
                remText.innerHTML = `<span class="text-green-600 font-bold">已達標！超額 $${(total-THRESHOLD).toFixed(2)}</span>`;
            } else {
                bar.className = "bg-blue-500 h-full transition-all duration-500 ease-out";
                badge.className = 'px-3 py-1 rounded-full text-[10px] font-bold bg-slate-100 text-slate-500';
                badge.innerText = '未達標';
                remText.innerHTML = total > 0 ? `還差 <span class="text-blue-600 font-bold">$${(THRESHOLD-total).toFixed(2)}</span>` : '請輸入商品';
            }
        }

        function calculateComparison() {
            const ap = parseFloat(document.getElementById('comp-a-price').value);
            const au = parseFloat(document.getElementById('comp-a-unit').value);
            const bp = parseFloat(document.getElementById('comp-b-price').value);
            const bu = parseFloat(document.getElementById('comp-b-unit').value);

            const cardA = document.getElementById('card-a');
            const cardB = document.getElementById('card-b');
            const resDiv = document.getElementById('compare-result');
            const winTxt = document.getElementById('winner-text');
            const winDiff = document.getElementById('winner-diff');

            if (!ap || !au || !bp || !bu) {
                showToast('請填寫所有欄位', '⚠️', 'bg-red-500');
                return;
            }

            const valA = ap / au;
            const valB = bp / bu;

            resDiv.classList.remove('hidden');
            cardA.classList.remove('winner-card');
            cardB.classList.remove('winner-card');

            if (valA < valB) {
                cardA.classList.add('winner-card');
                winTxt.innerText = "商品 A 更划算！";
                winDiff.innerText = `比商品 B 便宜了約 ${((valB - valA) / valB * 100).toFixed(1)}%`;
            } else if (valB < valA) {
                cardB.classList.add('winner-card');
                winTxt.innerText = "商品 B 更划算！";
                winDiff.innerText = `比商品 A 便宜了約 ${((valA - valB) / valA * 100).toFixed(1)}%`;
            } else {
                winTxt.innerText = "兩者性價比相同";
                winDiff.innerText = "";
            }
        }

        function resetComparison() {
            document.querySelectorAll('#view-compare input').forEach(i => i.value = '');
            document.getElementById('card-a').classList.remove('winner-card');
            document.getElementById('card-b').classList.remove('winner-card');
            document.getElementById('compare-result').classList.add('hidden');
        }

        function saveCurrentToHistory() {
            if (items.length === 0) return;
            history.unshift({
                id: Date.now(),
                time: new Date().toLocaleString('zh-HK'),
                total: items.reduce((s, i) => s + (i.price * i.qty), 0),
                list: [...items]
            });
            localStorage.setItem('shop_history', JSON.stringify(history.slice(0, 30)));
            items = [];
            showToast('已儲存', '💾', 'bg-blue-800');
            updateUI();
            switchTab('history');
        }

        function updateHistoryUI() {
            const container = document.getElementById('history-container');
            if (history.length === 0) {
                container.innerHTML = `<div class="text-center text-slate-300 py-12 text-sm italic">尚無記錄</div>`;
                return;
            }
            container.innerHTML = history.map(h => `
                <div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm">
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">${h.time}</p>
                            <p class="text-2xl font-black text-slate-800">$${h.total.toFixed(2)}</p>
                        </div>
                        <button onclick="deleteRecord(${h.id})" class="p-2 text-slate-300 hover:text-red-500">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                        </button>
                    </div>
                    <div class="flex flex-wrap gap-2">
                        ${h.list.map(i => `<span class="bg-slate-100 text-slate-600 px-2 py-1 rounded-lg text-[10px] font-bold">${i.name} x${i.qty}</span>`).join('')}
                    </div>
                </div>
            `).join('');
        }

        function deleteRecord(id) {
            history = history.filter(x => x.id !== id);
            localStorage.setItem('shop_history', JSON.stringify(history));
            updateHistoryUI();
        }

        function clearHistory() { if(confirm('確定要清空所有歷史記錄嗎？')) { history = []; localStorage.removeItem('shop_history'); updateHistoryUI(); } }
        function removeItem(i) { items.splice(i, 1); updateUI(); }
        function clearAll() { items = []; updateUI(); }
        function toggleSettings() { document.getElementById('settings-panel').classList.toggle('hidden'); }
        function saveTarget() {
            const v = parseFloat(document.getElementById('target-input').value);
            if(v > 0) { THRESHOLD = v; document.getElementById('goal-text').innerText = `目標金額: $${v.toFixed(2)}`; toggleSettings(); updateUI(); }
        }

        function showToast(msg, icon, color) {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            document.getElementById('toast-icon').innerText = icon;
            t.className = `fixed bottom-8 left-1/2 -translate-x-1/2 text-white px-6 py-3 rounded-2xl shadow-2xl z-50 font-bold flex items-center gap-2 pointer-events-none transition-all duration-500 ${color}`;
            t.style.opacity = '1'; t.style.transform = 'translateY(0) translateX(-50%)';
            setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateY(20px) translateX(-50%)'; }, 3000);
        }

        // Voice Support
        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.lang = 'zh-HK';
            recognition.onstart = () => document.getElementById('mic-btn').classList.add('text-red-500', 'pulse-mic');
            recognition.onend = () => document.getElementById('mic-btn').classList.remove('text-red-500', 'pulse-mic');
            recognition.onresult = (e) => {
                const t = e.results[0][0].transcript;
                const m = t.match(/(\d+(\.\d+)?)/);
                if(m) { 
                    document.getElementById('item-price').value = m[1]; 
                    document.getElementById('item-name').value = t.replace(m[0], '').trim(); 
                } else { 
                    document.getElementById('item-name').value = t; 
                }
            };
        }
        function toggleVoice() { if(recognition) recognition.start(); }
    </script>
</body>
</html>
